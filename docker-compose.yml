version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Helia — Production Docker Compose
# Containerised Healthcare Appointment Booking Platform
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: helia-postgres
    environment:
      POSTGRES_USER:               ${POSTGRES_USER}
      POSTGRES_PASSWORD:           ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_AUTH_DB},${POSTGRES_USER_DB},${POSTGRES_APPOINTMENT_DB},${POSTGRES_PAYMENT_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init.sh
    networks: [helia-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: helia-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_DB}
    volumes:
      - mongo-data:/data/db
    networks: [helia-network]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: helia-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=helia-cluster
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    networks: [helia-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: helia-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    networks: [helia-network]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Application services ────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: helia-auth
    environment:
      ENVIRONMENT:     production
      LOG_LEVEL:       info
      AWS_REGION:      ap-south-1
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PORT:            8001
      POSTGRES_HOST:   postgres
      POSTGRES_PORT:   5432
      REDIS_HOST:      redis
      REDIS_PORT:      6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: helia-user
    environment:
      ENVIRONMENT:      production
      LOG_LEVEL:        info
      AWS_REGION:       ap-south-1
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS}
      PORT:             8002
      POSTGRES_HOST:    postgres
      POSTGRES_PORT:    5432
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      postgres:     { condition: service_healthy }
      auth-service: { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    container_name: helia-appointment
    environment:
      ENVIRONMENT:              production
      LOG_LEVEL:                info
      AWS_REGION:               ap-south-1
      ALLOWED_ORIGINS:          ${ALLOWED_ORIGINS}
      PORT:                     8003
      POSTGRES_HOST:            postgres
      POSTGRES_PORT:            5432
      REDIS_HOST:               redis
      REDIS_PORT:               6379
      AUTH_SERVICE_URL:         http://auth-service:8001
      USER_SERVICE_URL:         http://user-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
    depends_on:
      postgres:     { condition: service_healthy }
      redis:        { condition: service_healthy }
      auth-service: { condition: service_healthy }
      user-service: { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: helia-notification
    environment:
      ENVIRONMENT:     production
      LOG_LEVEL:       info
      AWS_REGION:      ap-south-1
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PORT:            8004
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      SES_FROM_EMAIL:  ${SES_FROM_EMAIL}
    depends_on:
      redis: { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: helia-payment
    environment:
      ENVIRONMENT:      production
      LOG_LEVEL:        info
      AWS_REGION:       ap-south-1
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS}
      PORT:             8005
      POSTGRES_HOST:    postgres
      POSTGRES_PORT:    5432
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      postgres:     { condition: service_healthy }
      auth-service: { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  medical-records-service:
    build:
      context: ./services/medical-records-service
      dockerfile: Dockerfile
    container_name: helia-medical-records
    environment:
      ENVIRONMENT:      production
      LOG_LEVEL:        info
      AWS_REGION:       ap-south-1
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS}
      PORT:             8006
      MONGO_HOST:       mongodb
      MONGO_PORT:       27017
      S3_BUCKET:        helia-files
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      mongodb:      { condition: service_healthy }
      auth-service: { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  search-service:
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    container_name: helia-search
    environment:
      ENVIRONMENT:        production
      LOG_LEVEL:          info
      AWS_REGION:         ap-south-1
      ALLOWED_ORIGINS:    ${ALLOWED_ORIGINS}
      PORT:               8007
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      AUTH_SERVICE_URL:   http://auth-service:8001
    depends_on:
      elasticsearch: { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: helia-gateway
    environment:
      ENVIRONMENT:                 production
      LOG_LEVEL:                   info
      PORT:                        8000
      REDIS_HOST:                  redis
      REDIS_PORT:                  6379
      AUTH_SERVICE_URL:            http://auth-service:8001
      USER_SERVICE_URL:            http://user-service:8002
      APPOINTMENT_SERVICE_URL:     http://appointment-service:8003
      NOTIFICATION_SERVICE_URL:    http://notification-service:8004
      PAYMENT_SERVICE_URL:         http://payment-service:8005
      MEDICAL_RECORDS_SERVICE_URL: http://medical-records-service:8006
      SEARCH_SERVICE_URL:          http://search-service:8007
    depends_on:
      auth-service:            { condition: service_healthy }
      user-service:            { condition: service_healthy }
      appointment-service:     { condition: service_healthy }
      payment-service:         { condition: service_healthy }
      medical-records-service: { condition: service_healthy }
      search-service:          { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helia-frontend
    depends_on:
      api-gateway: { condition: service_healthy }
    networks: [helia-network]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: helia-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api-gateway
    networks: [helia-network]
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  mongo-data:
  elastic-data:
  redis-data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  helia-network:
    driver: bridge
