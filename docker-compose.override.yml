version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Helia — Development Override
#
# This file is automatically merged with docker-compose.yml when you run:
#   docker compose up
#
# It adds services and settings only needed in local development:
#   - MinIO  (S3-compatible local file storage, replaces AWS S3)
#   - Mailhog (catches all outgoing emails, replaces AWS SES)
#   - Exposed ports on all services (for direct access and Postman testing)
#   - ENVIRONMENT=development (disables AWS Secrets Manager)
#
# In production on AWS, use only the base file:
#   docker compose -f docker-compose.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Dev-only infrastructure ─────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: helia-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console → http://localhost:9001
    networks: [helia-network]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: helia-minio-init
    depends_on:
      minio: { condition: service_healthy }
    networks: [helia-network]
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/helia-files &&
        mc anonymous set none local/helia-files &&
        echo 'MinIO bucket ready'
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: helia-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    networks: [helia-network]

  # ── Override app services for development ───────────────────────────────────
  # Sets ENVIRONMENT=development so services use .env instead of Secrets Manager
  # Exposes ports so you can test each service directly with Postman

  postgres:
    ports:
      - "5432:5432"   # Direct DB access from host

  mongodb:
    ports:
      - "27017:27017" # Direct DB access from host

  redis:
    ports:
      - "6379:6379"   # Direct Redis access from host

  auth-service:
    environment:
      ENVIRONMENT:     development
      LOG_LEVEL:       debug
      ALLOWED_ORIGINS: "*"
    ports:
      - "8001:8001"

  user-service:
    environment:
      ENVIRONMENT:     development
      LOG_LEVEL:       debug
      ALLOWED_ORIGINS: "*"
    ports:
      - "8002:8002"

  appointment-service:
    environment:
      ENVIRONMENT:     development
      LOG_LEVEL:       debug
      ALLOWED_ORIGINS: "*"
    ports:
      - "8003:8003"

  notification-service:
    environment:
      ENVIRONMENT:     development
      LOG_LEVEL:       debug
      ALLOWED_ORIGINS: "*"
      MAIL_HOST:       mailhog
      MAIL_PORT:       "1025"
    ports:
      - "8004:8004"
    depends_on:
      - mailhog

  payment-service:
    environment:
      ENVIRONMENT:     development
      LOG_LEVEL:       debug
      ALLOWED_ORIGINS: "*"
    ports:
      - "8005:8005"

  medical-records-service:
    environment:
      ENVIRONMENT:  development
      LOG_LEVEL:    debug
      ALLOWED_ORIGINS: "*"
      # Point to MinIO instead of AWS S3
      S3_ENDPOINT:  http://minio:9000
      S3_BUCKET:    helia-files
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
    ports:
      - "8006:8006"
    depends_on:
      minio: { condition: service_healthy }

  search-service:
    environment:
      ENVIRONMENT:     development
      LOG_LEVEL:       debug
      ALLOWED_ORIGINS: "*"
    ports:
      - "8007:8007"

  api-gateway:
    environment:
      ENVIRONMENT: development
      LOG_LEVEL:   debug
    ports:
      - "8000:8000"

# ── Dev-only volumes ──────────────────────────────────────────────────────────
volumes:
  minio-data:
